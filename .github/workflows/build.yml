name: Build & Test

on:
  pull_request:
    branches: 
      - main
    types:
      - opened
      - reopened
      - synchronize

jobs:
  build:
    if: github.repository == 'KaraW3B/server'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
          
    - name: Login to NuGet
      env:
        GIT_NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
      run: dotnet nuget add source https://nuget.pkg.github.com/KaraW3B/index.json --name "KaraW3B-github" --username KaraW3B --password $GIT_NUGET_API_KEY
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src
    - name: Build
      run: dotnet build --no-restore
      working-directory: src
    - name: Test
      run: dotnet test --no-build
      working-directory: src
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.1.0
      
    - name: Build and push Docker image
      uses: docker/build-push-action@v7.3.0
      with:
        context: .
        push: false
        tags: karaw3b/server:pr
        cache-from: type=gha
        cache-to: type=gha,mode=max
