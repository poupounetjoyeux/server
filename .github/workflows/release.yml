name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: The version of the release (X.Y.Z or auto)
        default: auto
      stable:
        required: true
        type: boolean
        default: true
      title:
        required: false
        type: string
        description: An optional release title
      message:
        required: false
        type: string
        description: An optional release message
        
jobs:
  release:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
          
    - name: Restore backend dependencies
      run: dotnet restore
      working-directory: Back
    - name: Build backend
      run: dotnet build --configuration Release --no-restore
      working-directory: Back
    - name: Pack SDK
      run: dotnet pack --no-build --configuration Release
      working-directory: Back
