name: Build & push songs server

on:
  release:
    types:
      - published

jobs: 
  release:
    if: github.repository == 'KaraW3B/songs-server'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract release version
        run: |
          tagVersion="${{ github.event.release.tag_name }}"
          releaseVersion="${tagVersion:1}"
          echo "releaseVersion=$releaseVersion" >> $GITHUB_ENV
      
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
            
      - name: Login to NuGet
        env:
          GIT_NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet nuget add source https://nuget.pkg.github.com/KaraW3B/index.json --name "KaraW3B-github" --username KaraW3B --password $GIT_NUGET_API_KEY --store-password-in-clear-text
      
      - name: Restore dependencies
        run: dotnet restore
        working-directory: src
      
      - name: Build
        run: dotnet build --no-restore --configuration Release -p:Version=${{ env.releaseVersion }} -p:AssemblyVersion=${{ env.releaseVersion }} -p:FileVersion=${{ env.releaseVersion }}
        working-directory: src
        
      - name: Packing NuGets
        run: dotnet pack --configuration Release --no-build --version ${{ env.releaseVersion }}
        working-directory: src

      - name: Publish NuGets
        env:
          GIT_NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push "bin/Release/*.nupkg" --source https://nuget.pkg.github.com/KaraW3B/index.json --api-key $GIT_NUGET_API_KEY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/karaw3b/songs-server
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.releaseVersion }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
